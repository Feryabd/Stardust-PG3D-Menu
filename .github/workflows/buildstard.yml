name: Build Mod Menu

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 33
        build-tools: 33.0.2

    # LANGKAH PERBAIKAN: Menyisipkan repositori Xposed yang aktif ke build.gradle
    - name: Perbaiki Repositori Xposed yang Mati
      run: |
        sed -i "s|mavenCentral()|mavenCentral()\n        maven { url 'https://api.xposed.info/' }|g" build.gradle
        sed -i "s|google()|google()\n        maven { url 'https://api.xposed.info/' }|g" build.gradle

    - name: Beri Izin Akses Gradle
      run: chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace
